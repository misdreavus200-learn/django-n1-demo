services:
  - type: web
    name: n1-problem-demo
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py seed_data && python manage.py collectstatic --noinput
    startCommand: gunicorn n1_demo.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
