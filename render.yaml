services:
  - type: web
    name: n1-problem-demo
    env: python
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py migrate &&
      python manage.py seed_data &&
      python manage.py collectstatic --noinput
    startCommand: gunicorn n1_demo.wsgi:application --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: n1-demo-db
          property: connectionString

databases:
  - name: n1-demo-db
    databaseName: n1demo
    user: n1demo
